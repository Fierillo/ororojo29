<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="cobre" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a76a"/>
      <stop offset="50%" stop-color="#b87333"/>
      <stop offset="100%" stop-color="#8b5a2b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  
  <!-- Círculo de fondo glow -->
  <circle cx="400" cy="400" r="250" fill="#b87333" opacity="0.1" filter="blur(40px)"/>
  
  <!-- Icono de Sartenes -->
  <g transform="translate(250, 250)">
    <circle cx="150" cy="150" r="100" fill="url(#cobre)" stroke="#f5f0e6" stroke-width="4"/>
    <circle cx="150" cy="150" r="85" fill="url(#bg)" opacity="0.6"/>
    <path d="M 250 150 L 350 120" stroke="url(#cobre)" stroke-width="25" stroke-linecap="round"/>
    <path d="M 250 150 L 350 120" stroke="#f5f0e6" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  
  <text x="400" y="650" font-family="Georgia, serif" font-size="32" fill="#d4a76a" text-anchor="middle" letter-spacing="4">SET DE SARTENES</text>
</svg>